{% extends 'documentos/base.html' %}
{% block content %}
<div class="card shadow-sm border-0 p-4">
    <h2 class="fw-bold mb-3">Upload de Nota Fiscal</h2>
    <p class="text-muted mb-4">Envie PDFs ou imagens para processamento inteligente.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-4">
            <input type="file" name="arquivo" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Processar Documento</button>
    </form>
</div>
{% endblock %}
